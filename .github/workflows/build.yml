name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CGO_ENABLED: 0

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.0"

      - name: Build linux/amd64
        run: GOOS=linux GOARCH=amd64 go build -ldflags "-s -w" -o ssh_forward_linux_amd64 .

      - name: Build linux/arm64
        run: GOOS=linux GOARCH=arm64 go build -ldflags "-s -w" -o ssh_forward_linux_arm64 .

      - name: Build darwin/amd64
        run: GOOS=darwin GOARCH=amd64 go build -ldflags "-s -w" -o ssh_forward_darwin_amd64 .

      - name: Build darwin/arm64
        run: GOOS=darwin GOARCH=arm64 go build -ldflags "-s -w" -o ssh_forward_darwin_arm64 .

      - name: Build windows/amd64
        run: GOOS=windows GOARCH=amd64 go build -ldflags "-s -w" -o ssh_forward_windows_amd64.exe .

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            ssh_forward_linux_amd64
            ssh_forward_linux_arm64
            ssh_forward_darwin_amd64
            ssh_forward_darwin_arm64
            ssh_forward_windows_amd64.exe
