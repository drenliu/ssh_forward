name: Build

on:
  push:
    branches: ["*"]
  pull_request:
    branches: ["*"]

env:
  CGO_ENABLED: 0

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.0"

      - name: Build binary
        run: GOOS=linux GOARCH=amd64 go build -ldflags "-s -w" -o ssh_forward .

      - uses: actions/upload-artifact@v4
        with:
          name: ssh_forward
          path: ssh_forward
